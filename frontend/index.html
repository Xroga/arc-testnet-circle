<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Student Verification – Blink & ID</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0f1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e2a3a; max-width: 550px; width: 100%; border-radius: 32px; padding: 24px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5); color: #eef2ff; }
        h2 { margin-top: 0; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .step { background: #0f172a; border-radius: 24px; padding: 20px; margin-bottom: 24px; transition: 0.2s; border: 1px solid #334155; }
        .step-title { font-weight: 600; margin-bottom: 16px; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; color: #94a3b8; }
        .video-container { position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 12px; }
        video, canvas { width: 100%; display: block; border-radius: 16px; background: #000; }
        canvas { position: absolute; top: 0; left: 0; }
        button { background: #3b82f6; border: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; color: white; font-size: 0.9rem; cursor: pointer; margin-top: 12px; transition: 0.2s; width: 100%; }
        button.secondary { background: #334155; }
        button.danger { background: #dc2626; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .flex-btns { display: flex; gap: 12px; }
        .status { background: #0f172a; border-radius: 30px; padding: 10px 16px; font-size: 0.85rem; margin-top: 12px; border-left: 3px solid #3b82f6; }
        .file-label { background: #2d3a4e; padding: 12px; border-radius: 40px; text-align: center; cursor: pointer; display: block; margin-top: 12px; font-weight: 500; }
        input[type="file"] { display: none; }
        .preview-img { max-width: 100%; margin-top: 12px; border-radius: 16px; border: 1px solid #475569; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        hr { border-color: #334155; margin: 20px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2>🎓 Student verification</h2>
    <p style="margin-bottom: 24px;">We need a <strong>live selfie with a blink</strong> + your student ID card photo.</p>

    <!-- STEP 1: Camera + Blink detection -->
    <div class="step">
        <div class="step-title">📸 1. Look at camera & blink when told</div>
        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlayCanvas" style="position: absolute; top:0; left:0;"></canvas>
        </div>
        <button id="startCameraBtn" class="secondary">📷 Start camera</button>
        <div id="blinkStatus" class="status">⏳ Waiting for camera...</div>
        <button id="captureSelfieBtn" disabled>✅ Capture selfie AFTER blink</button>
    </div>

    <!-- STEP 2: ID card upload -->
    <div class="step">
        <div class="step-title">🪪 2. Upload your student ID (front side)</div>
        <label class="file-label" for="idInput">📁 Choose ID image</label>
        <input type="file" id="idInput" accept="image/jpeg,image/png,image/webp">
        <div id="idPreview"></div>
    </div>

    <!-- STEP 3: Email (optional but recommended) -->
    <div class="step">
        <div class="step-title">✉️ 3. University email (for faster verification)</div>
        <input type="email" id="studentEmail" placeholder="your.name@university.edu" style="width:100%; padding:12px; border-radius:40px; border:none; background:#0f172a; color:white;">
        <div class="status" style="margin-top: 12px;">We'll send a confirmation code to verify ownership.</div>
    </div>

    <hr>
    <div class="flex-btns">
        <button id="resetBtn" class="secondary">⟳ Reset all</button>
        <button id="submitBtn" style="background:#10b981;">🚀 Submit for review</button>
    </div>
    <div id="finalStatus" class="status"></div>
</div>

<!-- Load face-api.js from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.15.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.15.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.2/dist/face-landmarks-detection.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>
    // ---------- DOM elements ----------
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const captureSelfieBtn = document.getElementById('captureSelfieBtn');
    const blinkStatusDiv = document.getElementById('blinkStatus');
    const idInput = document.getElementById('idInput');
    const idPreviewDiv = document.getElementById('idPreview');
    const studentEmail = document.getElementById('studentEmail');
    const resetBtn = document.getElementById('resetBtn');
    const submitBtn = document.getElementById('submitBtn');
    const finalStatus = document.getElementById('finalStatus');

    // State variables
    let stream = null;
    let detectionInterval = null;
    let blinkDetected = false;
    let capturedSelfieData = null;     // base64 of the final selfie
    let idImageData = null;             // base64 of ID card
    let modelsLoaded = false;

    // ----- 1. Load face-api models (blink detection requires facemesh/landmarks) -----
    async function loadModels() {
        blinkStatusDiv.innerText = '⏳ Loading AI models (one time, ~4MB)...';
        try {
            // We need face detection + landmark models (68 point model enables eye aspect ratio)
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
            modelsLoaded = true;
            blinkStatusDiv.innerText = '✅ Models ready. Click "Start camera"';
        } catch(err) {
            console.error(err);
            blinkStatusDiv.innerText = '❌ Failed to load AI models. Check internet.';
        }
    }
    loadModels();

    // ----- 2. Start camera -----
    startCameraBtn.onclick = async () => {
        if (stream) {
            stopCamera();
        }
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, facingMode: "user" } });
            video.srcObject = stream;
            await video.play();
            // Resize canvas to match video dimensions
            const resizeCanvas = () => {
                if (video.videoWidth) {
                    overlayCanvas.width = video.videoWidth;
                    overlayCanvas.height = video.videoHeight;
                } else {
                    requestAnimationFrame(resizeCanvas);
                }
            };
            resizeCanvas();
            startBlinkDetection();
            blinkStatusDiv.innerHTML = '🟢 Camera active – look straight and BLINK when prompted.';
            captureSelfieBtn.disabled = false;
            startCameraBtn.disabled = true;
        } catch(err) {
            blinkStatusDiv.innerHTML = '❌ Camera access denied or error: ' + err.message;
        }
    };

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        if (detectionInterval) clearInterval(detectionInterval);
        video.srcObject = null;
        startCameraBtn.disabled = false;
        captureSelfieBtn.disabled = true;
    }

    // ----- 3. Blink detection using Eye Aspect Ratio (EAR) -----
    // Function to calculate EAR from landmarks
    function eyeAspectRatio(eyeLandmarks) {
        // eyeLandmarks: array of 6 points for each eye (indices 0-5)
        const p1 = eyeLandmarks[1];
        const p2 = eyeLandmarks[5];
        const p3 = eyeLandmarks[2];
        const p4 = eyeLandmarks[4];
        const p5 = eyeLandmarks[0];
        const p6 = eyeLandmarks[3];
        const vertical1 = Math.hypot(p1.x - p2.x, p1.y - p2.y);
        const vertical2 = Math.hypot(p3.x - p4.x, p3.y - p4.y);
        const horizontal = Math.hypot(p5.x - p6.x, p5.y - p6.y);
        if (horizontal === 0) return 0;
        return (vertical1 + vertical2) / (2.0 * horizontal);
    }

    let blinkCount = 0;
    let lastBlinkTime = 0;
    const BLINK_THRESHOLD = 0.2;   // EAR below this indicates closed eye
    const BLINK_COOLDOWN_MS = 800;  // ignore blinks within 0.8 sec

    async function detectBlink() {
        if (!video.videoWidth || !modelsLoaded) return;
        const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
        if (!detections) {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            return;
        }
        // Draw landmarks for debugging (optional)
        const landmarks = detections.landmarks;
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();
        const leftEAR = eyeAspectRatio(leftEye);
        const rightEAR = eyeAspectRatio(rightEye);
        const avgEAR = (leftEAR + rightEAR) / 2;
        const now = Date.now();
        if (avgEAR < BLINK_THRESHOLD && (now - lastBlinkTime) > BLINK_COOLDOWN_MS) {
            blinkCount++;
            lastBlinkTime = now;
            blinkStatusDiv.innerHTML = `😉 Blink detected! (${blinkCount} blink(s)) – Good! Now click "Capture selfie" while eyes open.`;
            // Show visual feedback
            ctx.fillStyle = 'rgba(0,255,0,0.2)';
            ctx.fillRect(0,0,overlayCanvas.width,overlayCanvas.height);
            setTimeout(() => ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height), 200);
        } else {
            blinkStatusDiv.innerHTML = `👀 Watching for blink... (${blinkCount} blink${blinkCount!==1?'s':''}) | EAR: ${avgEAR.toFixed(2)}`;
            ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
            // draw eye dots for fun
            const points = landmarks.positions;
            ctx.fillStyle = '#00ffcc';
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.5, 0, 2*Math.PI);
                ctx.fill();
            });
        }
        // auto-enable capture if at least one blink happened
        if (blinkCount > 0 && capturedSelfieData === null) {
            captureSelfieBtn.disabled = false;
        }
    }

    function startBlinkDetection() {
        if (detectionInterval) clearInterval(detectionInterval);
        detectionInterval = setInterval(detectBlink, 150);
    }

    // ----- 4. Capture selfie (with blink already verified) -----
    captureSelfieBtn.onclick = () => {
        if (!video.videoWidth) {
            alert("Camera not ready. Start camera first.");
            return;
        }
        if (blinkCount === 0) {
            alert("Please blink at least once so we know you're live. Look at camera and blink naturally.");
            return;
        }
        // Capture current video frame as image
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        capturedSelfieData = tempCanvas.toDataURL('image/jpeg', 0.8);
        blinkStatusDiv.innerHTML = `✅ Selfie captured! (blinks recorded: ${blinkCount})`;
        captureSelfieBtn.disabled = true;
        // Optional: show thumbnail
        const img = new Image();
        img.src = capturedSelfieData;
        img.style.width = '100%';
        img.style.borderRadius = '16px';
        img.style.marginTop = '8px';
        // remove previous preview if any
        const oldPrev = document.getElementById('selfiePreview');
        if(oldPrev) oldPrev.remove();
        img.id = 'selfiePreview';
        document.querySelector('#blinkStatus').after(img);
    };

    // ----- 5. ID upload & preview -----
    idInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            idImageData = ev.target.result;
            idPreviewDiv.innerHTML = `<img src="${idImageData}" class="preview-img" alt="ID preview">`;
        };
        reader.readAsDataURL(file);
    };

    // ----- 6. Reset all data -----
    resetBtn.onclick = () => {
        blinkCount = 0;
        capturedSelfieData = null;
        idImageData = null;
        idPreviewDiv.innerHTML = '';
        if (stream) stopCamera();
        startCameraBtn.disabled = false;
        captureSelfieBtn.disabled = true;
        blinkStatusDiv.innerHTML = '⏳ Reset. Click "Start camera" again.';
        const preview = document.getElementById('selfiePreview');
        if(preview) preview.remove();
        studentEmail.value = '';
        finalStatus.innerHTML = '';
        ctx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);
    };

    // ----- 7. Submit data to your backend (replace with your endpoint) -----
    submitBtn.onclick = async () => {
        if (!capturedSelfieData) {
            finalStatus.innerHTML = '❌ Please capture a selfie with blink first.';
            return;
        }
        if (!idImageData) {
            finalStatus.innerHTML = '❌ Please upload your student ID image.';
            return;
        }
        // Optional: email validation
        const email = studentEmail.value.trim();
        if (!email) {
            finalStatus.innerHTML = '⚠️ University email is recommended for faster verification. You can still proceed.';
        }
        finalStatus.innerHTML = '📤 Sending for review...';

        // Prepare payload to send to your server
        const payload = {
            selfie: capturedSelfieData,   // base64 jpeg
            idCard: idImageData,          // base64
            email: email,
            blinkCount: blinkCount,
            timestamp: Date.now()
        };

        // ----- REPLACE THIS URL WITH YOUR ACTUAL BACKEND ENDPOINT -----
        const SUBMIT_URL = 'https://your-server.com/api/verify-student';

        try {
            // In production, send via POST with credentials
            // For demo, we'll just simulate and show data in console
            console.log('Payload to send:', payload);
            finalStatus.innerHTML = '✅ Demo mode: data ready. Connect to your backend. See console.';
            // Uncomment when you have an API:
            /*
            const response = await fetch(SUBMIT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.success) {
                finalStatus.innerHTML = '🎉 Verification submitted! You will receive email confirmation.';
            } else {
                finalStatus.innerHTML = '❌ Error: ' + (result.error || 'unknown');
            }
            */
        } catch(err) {
            finalStatus.innerHTML = '❌ Network error: ' + err.message;
        }
    };

    // Helper to clean up on page unload
    window.addEventListener('beforeunload', () => {
        if (stream) stopCamera();
    });
</script>
</body>
</html>
